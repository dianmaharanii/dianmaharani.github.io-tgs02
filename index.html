<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Animasi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
    </div>

    <div class="container">
        <header>
            <h1>To-Do List</h1>
            <label for="datePicker">Pilih tanggal:</label>
            <input type="date" id="datePicker">
            <p id="tanggal">Tanggal: </p>
        </header>

        <div class="todo-input">
            <input type="text" id="taskInput" placeholder="Masukkan tugas...">
            <button id="addBtn">Tambah</button>
        </div>

        <ul id="taskList"></ul>

        <div class="footer">
            <img src="heart.gif" alt="Hati Bergerak" class="moving-heart">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
